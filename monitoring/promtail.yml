server:
  log_level: info
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # FSC Worker 日志
  - job_name: fsc-worker
    static_configs:
      - targets:
          - localhost
        labels:
          job: fsc-worker
          node: tokoyo
          __path__: /var/log/fsc-worker/*.log

  # MemoV 同步日志
  - job_name: memov-sync
    static_configs:
      - targets:
          - localhost
        labels:
          job: memov-sync
          node: tokoyo
          __path__: /var/log/memov/*.log

  # Docker 容器日志
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'project'
